name: Build FFmpeg and FFprobe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Generate timestamp
        id: timestamp
        run: echo "value=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"    

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FFbuild-linux-x86_64-${{ steps.timestamp.outputs.value }}
          path: artifacts/